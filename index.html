<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>礼品领取</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:40px;
    background:#f5f5f5;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
    width:220px;
    padding:12px;
    font-size:18px;
    margin:10px;
}

button{
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
}

img{
    max-width:100%;
    margin-top:20px;
    border-radius:10px;
}

#content{
    margin-top:20px;
    font-size:18px;
    line-height:1.8;
}
</style>

</head>
<body>

<div class="container">

<h1>🎁领取图片和文案然后发到小红书上</h1>

<p>请输入领取编号</p>

<input id="giftCode" placeholder="例如：001">

<br>

<button onclick="getGift()">领取</button>

<div id="result"></div>

</div>

<script>

// 替换成你的信息
const SUPABASE_URL = "https://tdyfoxxyskcnroptvkgz.supabase.co";
const SUPABASE_KEY = "sb_publishable_M8XZyErs-q4md0wuS3gZIA_BPjUtPzf";

async function getGift(){

    const code = document.getElementById("giftCode").value.trim();

    if(!code){
        alert("请输入编号");
        return;
    }

    const url =
    `${SUPABASE_URL}/rest/v1/gifts?code=eq.${encodeURIComponent(code)}&select=*`;

    try{

        const response = await fetch(url,{
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        });

        const data = await response.json();

        if(data.length === 0){

            document.getElementById("result").innerHTML = `
            <h3>❌ 编号不存在</h3>
            `;

            return;
        }

        const gift = data[0];

        document.getElementById("result").innerHTML = `
            <img src="${gift.image_url}">
            <div id="content">${gift.content}</div>
        `;

    }catch(error){

        document.getElementById("result").innerHTML = `
        <h3>系统错误</h3>
        <p>${error.message}</p>
        `;

        console.error(error);
    }
}

</script>

</body>
</html>
